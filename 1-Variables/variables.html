<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>variables practice</title>
</head>
<body>
    <script>
        // VAR -
        var a = 10
        console.log(a)
        // redeclare var
        a = 30
        console.log(a)

        // LET -
        let b = 'tony'
        console.log(b)
        // redeclare let
        b = 'franky'
        console.log(b)

        // CONST -
        const c = 40.50
        console.log(c)
    </script>
</body>
</html>
